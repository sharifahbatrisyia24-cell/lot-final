<!doctype html>

<html lang="en">

    <head>

        <meta charset="utf-8">

        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

        <title>Sistem GIS Lot Tanah Mukim Kesang</title>

        

        <link rel="stylesheet" href="./resources/ol.css">

        <link rel="stylesheet" href="resources/fontawesome-all.min.css">

        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">

        <link rel="stylesheet" href="./resources/qgis2web.css">

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

        

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        

        <style>

            :root { --neon-red: #ed1c24; --dark: #1a1c23; --yellow: #ffea00; }

            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; font-family: 'Poppins', sans-serif; background: #000; }

            

            #navbar { position: absolute; top: 0; left: 0; right: 0; height: 70px; background: white; display: flex; align-items: center; padding: 0 25px; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 4px solid var(--neon-red); }

            .nav-logo { height: 50px; }

            #navbar-title { font-weight: 700; color: #0054a6; font-size: 18px; text-transform: uppercase; margin-left: 15px; }

            

            .search-box { position: absolute; top: 85px; left: 80px; z-index: 2100; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 10px; display: flex; border: 1px solid var(--neon-red); }

            .search-box input { border: none; background: transparent; padding: 10px; width: 200px; outline: none; color: white; }

            .search-box button { background: var(--neon-red); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }



            #sidebar { position: absolute; top: 70px; left: -360px; bottom: 35px; width: 330px; background: rgba(26, 28, 35, 0.95); z-index: 2500; padding: 25px; transition: 0.4s; color: white; border-right: 3px solid var(--neon-red); overflow-y: auto; }

            #sidebar.active { left: 0; }



            .controls-container { position: absolute; top: 85px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2100; }

            .btn-main { width: 50px; height: 50px; background: rgba(0,0,0,0.8); color: white; border: 1px solid var(--neon-red); border-radius: 10px; cursor: pointer; font-size: 20px; }



            .ol-popup { position: absolute; background: white; padding: 15px; border-radius: 12px; border: 3px solid var(--neon-red); bottom: 15px; left: -50px; min-width: 180px; box-shadow: 0 0 20px rgba(0,0,0,0.5); color: #333; font-size: 13px; }

            

            .info-card { background: rgba(255,255,255,0.1); border-radius: 10px; border-left: 5px solid var(--yellow); padding: 20px; }

            .info-table { width: 100%; }

            .info-table td { padding: 8px 5px; color: white !important; border-bottom: 1px solid rgba(255,255,255,0.1); }

            .info-table td b { color: var(--yellow) !important; }

            

            .btn-print { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 15px; }

            #footer { position: absolute; bottom: 0; width: 100%; height: 35px; background: #000; color: #888; display: flex; justify-content: center; align-items: center; font-size: 11px; z-index: 2000; }

            

            /* Pastikan Layer Switcher nampak jelas */

            .ol-layerswitcher { top: 85px; right: 20px; z-index: 2100; background: rgba(0,0,0,0.7); border-radius: 8px; padding: 5px; }

            .ol-layerswitcher label { color: white; font-size: 12px; }

        </style>

    </head>

    <body>



        <div id="navbar">

            <img class="nav-logo" src="logo politeknik 2.png" alt="POLITEKNIK">

            <span id="navbar-title">Sistem GIS Lot Tanah Mukim Kesang, Tangkak</span>

        </div>



        <div class="search-box">

            <input type="text" id="search-input" placeholder="Cari No Lot...">

            <button onclick="searchLot()"><i class="fas fa-search"></i></button>

        </div>



        <div class="controls-container">

            <button class="btn-main" onclick="toggleSidebar()"><i class="fas fa-info-circle"></i></button>

            <button class="btn-main" onclick="location.reload()"><i class="fas fa-sync"></i></button>

        </div>



        <div id="popup" class="ol-popup"><div id="popup-content"></div></div>



        <div id="sidebar">

            <div class="info-card">

                <h3 style="margin:0; color:var(--yellow);">BUTIRAN LOT</h3>

                <div id="feature-info" style="margin-top:15px; color:#ccc;">Klik pada lot tanah.</div>

                <div id="print-area" style="display:none;">

                    <button id="btn-export" class="btn-print" onclick="exportPDF()">CETAK PDF</button>

                </div>

            </div>

            <button onclick="toggleSidebar()" style="width:100%; margin-top:20px; background:none; border:1px solid #666; color:#ccc; padding:10px; cursor:pointer;">TUTUP</button>

        </div>



        <div id="map"></div>

        <div id="footer">&copy; 2026 JABATAN KEJURUTERAAN AWAM - PUO</div>



        <script src="resources/qgis2web_expressions.js"></script>

        <script src="./resources/functions.js"></script>

        <script src="./resources/ol.js"></script>

        <script src="./resources/ol-layerswitcher.js"></script>

        <script src="layers/LOTPALINGFINAL_0.js"></script>

        <script src="layers/TANDASEMPADANGABUNG_1.js"></script>

        <script src="styles/LOTPALINGFINAL_0_style.js"></script>

        <script src="styles/TANDASEMPADANGABUNG_1_style.js"></script>

        <script src="./layers/layers.js"></script>

        <script src="./resources/qgis2web.js"></script>



        <script>

            // --- 1. SETUP BASE LAYERS (UPDATE: Google & OSM) ---

            var googleSat = new ol.layer.Tile({

                title: 'Google Satellite',

                type: 'base',

                visible: true,

                source: new ol.source.XYZ({ 

                    url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',

                    crossOrigin: 'anonymous' 

                })

            });



            var osmMap = new ol.layer.Tile({

                title: 'Street Map (Tangkak)',

                type: 'base',

                visible: false,

                source: new ol.source.OSM()

            });



            // Susun layer (Base layers di bawah sekali)

            map.getLayers().insertAt(0, osmMap);

            map.getLayers().insertAt(1, googleSat);



            // Re-aktifkan Layer Switcher

            var layerSwitcher = new ol.control.LayerSwitcher({ tipLabel: 'Pilih Layer' });

            map.addControl(layerSwitcher);



            // --- 2. POPUP CONFIG ---

            var container = document.getElementById('popup');

            var content = document.getElementById('popup-content');

            var overlay = new ol.Overlay({ element: container, autoPan: true });

            map.addOverlay(overlay);



            var selStyle = new ol.style.Style({

                stroke: new ol.style.Stroke({ color: '#ffea00', width: 4 }),

                fill: new ol.style.Fill({ color: 'rgba(255, 234, 0, 0.3)' })

            });

            var selectedF = null;



            // --- 3. CLICK INTERACTION ---

            map.on('singleclick', function (evt) {

                var feature = map.forEachFeatureAtPixel(evt.pixel, f => f);

                

                if (feature) {

                    var geom = feature.getGeometry();

                    if (geom.getType().includes('Point')) {

                        var coord = geom.getCoordinates();

                        content.innerHTML = `<b style="color:red">BATU SEMPADAN</b><br>E: ${coord[0].toFixed(3)}<br>N: ${coord[1].toFixed(3)}`;

                        overlay.setPosition(evt.coordinate);

                    } else {

                        displayData(feature);

                        overlay.setPosition(undefined);

                    }

                } else {

                    overlay.setPosition(undefined);

                }

            });



            // --- 4. SIDEBAR DISPLAY (UPDATE: Nama Kolum Join) ---

            function displayData(f) {

                if (selectedF) selectedF.setStyle(undefined);

                selectedF = f;

                f.setStyle(selStyle);

                

                var p = f.getProperties();

                var noLot = p['NO_LOT'] || 'N/A';

                

                // MENGGUNAKAN KOLUM 'tsp — pe' (Pastikan guna simbol dash yang betul dari QGIS)

                var namaPemilik = p['tsp — pe'] || p['tsp - pe'] || p['PEMILIK'] || 'TIADA REKOD'; 

                

                f.set('NAMA_FIX', namaPemilik);



                document.getElementById('feature-info').innerHTML = `

                    <table class="info-table">

                        <tr><td><b>NO LOT</b></td><td>: ${noLot}</td></tr>

                        <tr><td><b>PEMILIK</b></td><td>: ${namaPemilik}</td></tr>

                        <tr><td><b>AREA</b></td><td>: ${p['AREA'] || 'N/A'} m²</td></tr>

                    </table>

                    <div style="margin-top:20px; padding:10px; border:1px dashed var(--yellow); font-size:10px; line-height:1.4;">

                        <b style="color:var(--yellow)">DISEDIAKAN OLEH:</b><br>

                        SHARIFAH NUR ALEEYA BATRISYIA BINTI SYED FAIZAL

                    </div>`;

                

                document.getElementById('print-area').style.display = 'block';

                document.getElementById('sidebar').classList.add('active');

                map.getView().fit(f.getGeometry().getExtent(), { duration: 1000, padding: [100, 100, 100, 100] });

            }



            // --- 5. SEARCH ---

            function searchLot() {

                var val = document.getElementById('search-input').value.trim();

                var found = false;

                lyr_LOTPALINGFINAL_0.getSource().getFeatures().forEach(f => {

                    if (String(f.get('NO_LOT')).trim() == val) {

                        displayData(f);

                        found = true;

                    }

                });

                if(!found && val !== "") alert("No Lot tidak dijumpai.");

            }



            function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }



            // --- 6. PRINT PDF LENGKAP ---

            async function exportPDF() {

                if (!selectedF) return;

                const btn = document.getElementById('btn-export');

                btn.innerText = "Sila Tunggu...";

                btn.disabled = true;



                const { jsPDF } = window.jspdf;

                const doc = new jsPDF();

                let p = selectedF.getProperties();

                let namaPemilik = selectedF.get('NAMA_FIX') || 'TIADA REKOD';



                doc.setFontSize(16);

                doc.text("LAPORAN MAKLUMAT LOT TANAH", 105, 20, { align: "center" });

                doc.line(20, 25, 190, 25);

                doc.setFontSize(12);

                doc.text(`No. Lot: ${p['NO_LOT']}`, 20, 40);

                doc.text(`Nama Pemilik: ${namaPemilik}`, 20, 50);

                doc.text(`Keluasan: ${p['AREA']} m2`, 20, 60);



                await html2canvas(document.getElementById('map'), {

                    useCORS: true,

                    ignoreElements: (el) => el.classList.contains('ol-control') || el.classList.contains('search-box')

                }).then(canvas => {

                    const imgData = canvas.toDataURL('image/png');

                    doc.addImage(imgData, 'PNG', 20, 70, 170, 100);

                });



                doc.setFontSize(10);

                doc.text("Disediakan oleh: SHARIFAH NUR ALEEYA BATRISYIA BINTI SYED FAIZAL", 20, 195);

                doc.save(`Laporan_Lot_${p['NO_LOT']}.pdf`);

                

                btn.innerText = "CETAK PDF";

                btn.disabled = false;

            }

        </script>

    </body>

</html>
